  - main [ref=e5]:
    - heading "Privacy Policy" [level=1] [ref=e6]
    - paragraph [ref=e7]: "Effective: June 2025"
    - paragraph [ref=e8]: Aroid is a podcast player. It fetches podcast feeds and plays audio. It does not have accounts, does not track you, and does not sell data. This policy describes the limited data that does leave your device and why.
    - heading "What leaves your device" [level=2] [ref=e9]
    - heading "Podcast feed requests" [level=3] [ref=e10]
    - paragraph [ref=e11]: When you subscribe to a podcast or refresh your library, the app fetches RSS feeds directly from the podcast publishers you choose to follow. Those servers receive your IP address and a standard HTTP user-agent string, exactly as any podcast app or web browser does. Aroid has no control over how podcast publishers handle these requests.
    - heading "iTunes Search API" [level=3] [ref=e12]
    - paragraph [ref=e13]:
      - text: When you search for a podcast to add, your search query is sent to Apple's iTunes Search API. Apple's
      - link "privacy policy" [ref=e14] [cursor=pointer]:
        - /url: https://www.apple.com/legal/privacy/
      - text: governs that request.
    - heading "Crash reports" [level=3] [ref=e15]
    - paragraph [ref=e16]:
      - text: If the app crashes, a diagnostic report is sent to
      - link "Sentry," [ref=e17] [cursor=pointer]:
        - /url: https://sentry.io
      - text: a crash-reporting service. These reports contain a crash stack trace and basic technical device information (OS version, app version, device model). They do not contain your podcast subscriptions, episode content, transcripts, or any information that identifies you as an individual. Sentry's servers are located in the United States.
    - heading "What stays on your device" [level=2] [ref=e18]
    - list [ref=e19]:
      - listitem [ref=e20]:
        - strong [ref=e21]: Subscriptions and episode metadata
        - text: — feed URLs, episode titles, descriptions, and publication dates are stored in a local database and never transmitted.
      - listitem [ref=e22]:
        - strong [ref=e23]: Playback state
        - text: — your listening position and history are stored locally and excluded from iCloud backup.
      - listitem [ref=e24]:
        - strong [ref=e25]: Downloaded audio
        - text: — episode files you download are stored on your device and excluded from iCloud backup.
      - listitem [ref=e26]:
        - strong [ref=e27]: Transcripts, chapters, and ad detection
        - text: — all audio analysis (transcription, speaker diarization, ad detection) runs entirely on your device using on-device models. No audio or transcript content is ever sent to a server.
    - heading "iCloud settings sync" [level=2] [ref=e28]
    - paragraph [ref=e29]:
      - text: App preferences (playback speed, skip intervals, refresh frequency, and similar settings) may be synced across your devices via iCloud. This sync contains only your in-app configuration — no podcast subscriptions, episode content, or listening history. iCloud sync is governed by
      - link "Apple's privacy policy." [ref=e30] [cursor=pointer]:
        - /url: https://www.apple.com/legal/privacy/
    - heading "Children's privacy" [level=2] [ref=e31]
    - paragraph [ref=e32]: Aroid does not knowingly collect any information from children under 13.
    - heading "Changes to this policy" [level=2] [ref=e33]
    - paragraph [ref=e34]: If this policy changes materially, the effective date above will be updated. Continued use of the app after a change constitutes acceptance of the updated policy.
    - heading "Contact" [level=2] [ref=e35]
    - paragraph [ref=e36]:
      - text: "Questions about this policy:"
      - link "contact@aroidpod.com" [ref=e37] [cursor=pointer]:
        - /url: mailto:contact@aroidpod.com